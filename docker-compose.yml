services:
  postgres:
    image: postgres:16
    container_name: postgres_ht
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build: .
    container_name: discord
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HMAC_KEY: ${HMAC_KEY}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
volumes:
  postgres_data: